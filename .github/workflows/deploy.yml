name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 141.227.151.20
          username: ubuntu
          password: ${{ secrets.VPS_PASSWORD }}
          port: 2222
          command_timeout: 20m
          script: |
            # Clone or pull
            if [ -d "/home/ubuntu/ableducacion" ]; then
              cd /home/ubuntu/ableducacion
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/datxale/ableducacion.git /home/ubuntu/ableducacion
              cd /home/ubuntu/ableducacion
            fi

            # Backend
            cd /home/ubuntu/ableducacion/backend
            python3 -m venv venv || true
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            cp .env.example .env 2>/dev/null || true

            # Frontend
            cd /home/ubuntu/ableducacion/frontend
            npm install --legacy-peer-deps 2>/dev/null
            npm run build

            # Copy frontend build to nginx
            sudo rm -rf /var/www/ableducacion
            sudo cp -r build /var/www/ableducacion

            # Restart services
            sudo systemctl restart ableducacion-backend || true
            sudo systemctl reload nginx || true
